<!DOCTYPE html>
<html>
<head>
  <title>ADSBitvex – Final Test</title>
  <script src="https://bdeugbqsqjghdltkrkbg.supabase.co/functions/v1/ad-script?appid=3196b91c0b69"></script>
</head>
<body>
  <button onclick="showRewardedAd()">Show Rewarded Ad</button>
  <pre id="log"></pre>

  <script>
    const logDiv = document.getElementById('log');
    function log(msg) {
      logDiv.innerText += msg + '\n';
      console.log(msg);
    }

    // Wait for the script to load
    setTimeout(() => {
      if (typeof window.showadsbitvex === 'function') {
        log('✅ SDK ready');
      } else {
        log('❌ SDK not loaded – check Network tab');
      }
    }, 1000);

    async function showRewardedAd() {
      if (typeof window.showadsbitvex !== 'function') {
        log('SDK not ready');
        return;
      }
      log('Calling showadsbitvex()...');
      try {
        await window.showadsbitvex();
        log('✅ Reward granted! +50 credits');
        // Your reward logic here
      } catch (err) {
        log(`❌ Ad error: ${err?.message || err}`);
      }
    }
  </script>
</body>
</html>
