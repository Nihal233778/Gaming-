<!DOCTYPE html>
<html>
<head>
  <title>ADSBitvex Test</title>
  <!-- CORRECT SCRIPT URL with appId (capital I) -->
  <script src="https://budgebpsqjghdltrkzbg.supabase.co/functions/v1/ad-script?appId=3196b91c0b69"></script>
</head>
<body>
  <button onclick="testAd()">Show Ad</button>
  <pre id="log"></pre>
  <script>
    function log(msg) {
      const pre = document.getElementById('log');
      pre.innerText += msg + '\n';
      console.log(msg);
    }

    // Wait a moment for the script to load
    setTimeout(() => {
      log(`typeof window.showadsbitvex = ${typeof window.showadsbitvex}`);
      if (typeof window.showadsbitvex === 'function') {
        log('✅ SDK loaded correctly');
      } else {
        log('❌ SDK function missing – check network tab for script response');
      }
    }, 1000);

    async function testAd() {
      if (typeof window.showadsbitvex !== 'function') {
        log('❌ showadsbitvex not available');
        return;
      }
      log('Calling showadsbitvex()...');
      try {
        await window.showadsbitvex();
        log('✅ Ad watched – reward granted!');
      } catch (err) {
        log(`❌ Ad error: ${err?.message || err}`);
      }
    }
  </script>
</body>
</html>
