<!DOCTYPE html>
<html>
<head>
  <title>ADSBitv Test</title>
  <!-- Real SDK script -->
  <script src="https://bdeugbqsqjghdltkrkbg.supabase.co/functions/v1/ad-script?appid=3196b91c0b69"></script>
</head>
<body>
  <button onclick="testAd()">Test Ad</button>
  <pre id="log"></pre>
  <script>
    function log(msg) {
      document.getElementById('log').innerText += msg + '\n';
      console.log(msg);
    }

    // Wait for script to load, then check if showadsbitvex exists
    setTimeout(() => {
      log("After 2 seconds: typeof window.showadsbitvex = " + typeof window.showadsbitvex);
      if (typeof window.showadsbitvex === 'function') {
        log("✅ SDK function exists");
      } else {
        log("❌ SDK function missing");
      }
    }, 2000);

    async function testAd() {
      if (typeof window.showadsbitvex !== 'function') {
        log("❌ showadsbitvex not available");
        return;
      }
      log("Calling showadsbitvex()...");
      try {
        await window.showadsbitvex();
        log("✅ Ad watched – reward granted");
      } catch (err) {
        log("❌ Ad error: " + (err?.message || err));
      }
    }
  </script>
</body>
</html>
