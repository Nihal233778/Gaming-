<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSwipe Arena · Telegram Game</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
        }
        .game-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            padding: 24px 20px 32px;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #3b6cb0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .subhead {
            color: #4a5568;
            font-size: 1rem;
            margin-bottom: 20px;
            font-weight: 400;
            border-bottom: 1px dashed #cbd5e0;
            padding-bottom: 12px;
        }
        .score-board {
            background: #2d3748;
            border-radius: 60px;
            padding: 12px 24px;
            display: inline-block;
            margin-bottom: 24px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .score-board span {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .score-label {
            color: #a0aec0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .ad-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 20px 16px 18px;
            margin-bottom: 28px;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.2);
            border: 2px solid #edf2f7;
        }
        .ad-image {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: cover;
            border-radius: 18px;
            background: #e2e8f0;
            margin-bottom: 16px;
            border: 1px solid #cbd5e0;
        }
        .ad-headline {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .ad-description {
            color: #475569;
            font-size: 1rem;
            padding: 0 8px;
        }
        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 24px 0 16px;
        }
        .btn {
            border: none;
            background: none;
            font-size: 2.2rem;
            width: 80px;
            height: 80px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-like {
            background: #10b981;
            color: white;
        }
        .btn-dislike {
            background: #ef4444;
            color: white;
        }
        .btn:active {
            transform: scale(0.9);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .feedback {
            min-height: 40px;
            font-size: 1.3rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            background: #f8fafc;
            padding: 8px 16px;
            margin-top: 8px;
            border: 1px solid #e2e8f0;
        }
        /* Button row for New Game & Submit */
        .bottom-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .secondary-btn {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 0 1 auto;
        }
        .secondary-btn:hover {
            background: #2563eb;
        }
        .secondary-btn:active {
            transform: scale(0.97);
        }
        .submit-btn {
            background: #8b5cf6;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }
        .submit-btn:hover {
            background: #7c3aed;
        }
        .footer-note {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="game-card">
        <h1>AdSwipe Arena</h1>
        <div class="subhead">⚡ tap • rate • dominate</div>

        <div class="score-board">
            <div class="score-label">SCORE</div>
            <span id="scoreValue">0</span>
        </div>

        <!-- Ad display card -->
        <div class="ad-card">
            <img id="adImage" class="ad-image" src="https://placehold.co/400x200/3b82f6/white?text=Loading+Ad..." alt="ad creative">
            <div id="adHeadline" class="ad-headline">Awesome Product</div>
            <div id="adDescription" class="ad-description">Short description will appear here</div>
        </div>

        <!-- Like / Dislike buttons -->
        <div class="action-buttons">
            <button class="btn btn-like" id="likeBtn">👍</button>
            <button class="btn btn-dislike" id="dislikeBtn">👎</button>
        </div>

        <!-- Instant feedback area -->
        <div id="feedbackMessage" class="feedback">👆 vote now</div>

        <!-- TWO CLICKABLE BOTTOM BUTTONS: New Game and Submit Score -->
        <div class="bottom-buttons">
            <button class="secondary-btn" id="newGameBtn">↻ New Game</button>
            <button class="secondary-btn submit-btn" id="submitScoreBtn">🏆 Submit Score</button>
        </div>

        <div class="footer-note">— game category —</div>
    </div>

    <script>
        (function() {
            // --- Telegram WebApp init ---
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.expand();               // expand to full height
                tg.enableClosingConfirmation(); // optional
            }

            // --- Game data (simulated ads) ---
            const ads = [
                { image: 'https://placehold.co/400x200/22c55e/white?text=Ergonomic+Chair', headline: 'Ergonomic Chair', description: 'Back pain? Never again! 40% off today.', good: true },
                { image: 'https://placehold.co/400x200/eab308/black?text=Burger+King', headline: 'Whopper Deal', description: 'Buy 1 Get 1 Free – limited time.', good: false },
                { image: 'https://placehold.co/400x200/ef4444/white?text=Online+Casino', headline: 'Win Big!', description: 'Spin the wheel and get up to $500.', good: false },
                { image: 'https://placehold.co/400x200/3b82f6/white?text=Learning+App', headline: 'Learn Python', description: 'Interactive courses, start for free.', good: true },
                { image: 'https://placehold.co/400x200/a855f7/white?text=Skincare+Set', headline: 'Glowing Skin Kit', description: 'Natural ingredients – 30% off first order.', good: true }
            ];

            let currentAd = null;
            let score = 0;

            // DOM elements
            const scoreSpan = document.getElementById('scoreValue');
            const adImage = document.getElementById('adImage');
            const adHeadline = document.getElementById('adHeadline');
            const adDescription = document.getElementById('adDescription');
            const feedbackDiv = document.getElementById('feedbackMessage');
            const likeBtn = document.getElementById('likeBtn');
            const dislikeBtn = document.getElementById('dislikeBtn');
            const newGameBtn = document.getElementById('newGameBtn');
            const submitBtn = document.getElementById('submitScoreBtn');

            // Helper: pick random ad
            function getRandomAd() {
                return ads[Math.floor(Math.random() * ads.length)];
            }

            // Load a new ad into UI
            function loadNewAd() {
                currentAd = getRandomAd();
                adImage.src = currentAd.image;
                adHeadline.innerText = currentAd.headline;
                adDescription.innerText = currentAd.description;
                // Reset feedback to neutral
                feedbackDiv.innerText = '👆 new ad – vote!';
                feedbackDiv.style.color = '#334155';
                feedbackDiv.style.background = '#f8fafc';
            }

            // Update score display
            function updateScore() {
                scoreSpan.innerText = score;
            }

            // Reset game (new game button)
            function resetGame() {
                score = 0;
                updateScore();
                loadNewAd();
                feedbackDiv.innerText = '🔄 game restarted!';
                feedbackDiv.style.color = '#1e3c72';
                feedbackDiv.style.background = '#e0f2fe';
                setTimeout(() => {
                    if (feedbackDiv.innerText === '🔄 game restarted!') {
                        feedbackDiv.innerText = '👆 vote now';
                        feedbackDiv.style.color = '#334155';
                        feedbackDiv.style.background = '#f8fafc';
                    }
                }, 1200);
            }

            // Show feedback message (colored)
            function showFeedback(message, isCorrect) {
                feedbackDiv.innerText = message;
                feedbackDiv.style.background = isCorrect ? '#d1fae5' : '#fee2e2';
                feedbackDiv.style.color = isCorrect ? '#065f46' : '#991b1b';
            }

            // Handle a vote (user's choice: true = liked, false = disliked)
            function handleVote(userLiked) {
                if (!currentAd) return;

                const isCorrect = (userLiked === currentAd.good);
                if (isCorrect) {
                    score += 10;
                    showFeedback('✅ Correct! +10 points', true);
                } else {
                    showFeedback('❌ Oops! Wrong vote', false);
                }

                updateScore();

                // After short delay, load next ad
                setTimeout(() => {
                    loadNewAd();
                }, 600);
            }

            // Submit score to Telegram bot
            function submitScore() {
                if (tg) {
                    // Send the current score as a JSON string
                    tg.sendData(JSON.stringify({ score: score }));
                    // Optionally close the app
                    tg.close();
                } else {
                    alert('Score: ' + score + ' (Telegram integration not available)');
                }
            }

            // Event listeners
            likeBtn.addEventListener('click', () => handleVote(true));
            dislikeBtn.addEventListener('click', () => handleVote(false));
            newGameBtn.addEventListener('click', resetGame);
            submitBtn.addEventListener('click', submitScore);

            // Initialize first ad
            loadNewAd();
            updateScore();

            // Prevent double-tap zoom on buttons (better mobile)
            [likeBtn, dislikeBtn, newGameBtn, submitBtn].forEach(btn => {
                btn.addEventListener('touchstart', (e) => e.preventDefault());
            });
        })();
    </script>
</body>
</html>
