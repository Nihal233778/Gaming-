<!DOCTYPE html>
<html>
<head>
  <title>Test</title>
  <!-- Try lowercase appid -->
  <script src="https://budgebpsqjghdltrkzbg.supabase.co/functions/v1/ad-script?appid=3196b91c0b69"></script>
</head>
<body>
  <button onclick="test()">Test</button>
  <pre id="log"></pre>
  <script>
    function log(msg) {
      document.getElementById('log').innerText += msg + '\n';
      console.log(msg);
    }

    setTimeout(() => {
      log(`typeof window.showadsbitvex = ${typeof window.showadsbitvex}`);
      log(`Any global with 'adsbitv': ${Object.keys(window).filter(k => k.toLowerCase().includes('adsbitv'))}`);
    }, 1500);

    async function test() {
      if (typeof window.showadsbitvex === 'function') {
        log('Calling showadsbitvex...');
        try {
          await window.showadsbitvex();
          log('Reward granted!');
        } catch(e) {
          log('Ad error: ' + e.message);
        }
      } else {
        log('showadsbitvex not available');
      }
    }
  </script>
</body>
</html>
